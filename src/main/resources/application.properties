spring.application.name=demo
spring.datasource.url=jdbc:mysql://localhost:3306/employee_db
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:${EMAIL_USER:}}
spring.mail.password=${MAIL_PASSWORD:${EMAIL_PASS:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Optional: override sender address
app.mail.from=${MAIL_FROM:${spring.mail.username:}}

# JWT
# Lưu ý: nên dùng chuỗi random dài (>= 64 ký tự cho HS512)
jwt.secret=CHANGE_ME_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
jwt.expirationMs=86400000

